services:
  - type: web
    name: hris-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hris-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://hris-frontend.onrender.com
      - key: PORT
        value: 10000

databases:
  - name: hris-db
    databaseName: hris_db
    user: hris_user
    plan: free
